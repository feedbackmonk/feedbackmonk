# multi-tenant-isolation-check allowlist
#
# Methods on repository traits that legitimately do NOT take &TenantScope or
# &ProjectScope as their first non-&self argument. Each entry MUST cite
# the rationale (typically: pre-authentication boundary — runs BEFORE a
# TenantScope can exist).
#
# Format:
#   [[methods]]                          # trait method
#   trait = "TenantRepo"
#   method = "create"
#   rationale = "Pre-auth: signup creates the tenant; no TenantScope exists yet."
#
#   [[inherent_methods]]                 # method on an inherent impl (e.g. constructor)
#   type_name = "SqlxTenantRepo"
#   method = "new"
#   rationale = "Repo constructor; no DB access."
#
# Probe A (raw-SQL outside repository) has NO allowlist by design - DEC-FBR-03
# declares any raw SQL outside crates/feedbackmonk-repository/ a security incident.

[[methods]]
trait = "TenantRepo"
method = "create"
rationale = "Pre-auth: signup creates the tenant; no TenantScope exists yet (DEC-FBR-03 boundary)."

[[methods]]
trait = "TenantRepo"
method = "find_by_email"
rationale = "Pre-auth: login lookup by email runs BEFORE password verification, hence before a TenantScope can be minted."

[[methods]]
trait = "TenantRepo"
method = "scope_for"
rationale = "Pre-auth bridge: mints the FIRST TenantScope from a verified Uuid. Callers MUST have authenticated the bearer before invoking (Stage 2 Worker A wraps this behind login/session). The Uuid argument is a verified-tenant identifier, not arbitrary user input."

[[methods]]
trait = "EmailVerificationRepo"
method = "redeem"
rationale = "Pre-auth: opaque verify-email token IS the credential. At redemption time the tenant is in pending-verification state (verified_at IS NULL) and no TenantScope can exist. The repository looks up the row and returns it; the API layer then uses TenantRepo::scope_for to mint a scope for downstream calls (mark_used + mark_verified). Mirrors the rationale for TenantRepo::find_by_email."

[[methods]]
trait = "ProjectRepo"
method = "open_for_submission"
rationale = "Pre-auth boundary: the public submission endpoint (FR-FBR-03, POST /api/v1/projects/{project_id}/feedback) has NO TenantScope by design -- the end-user JWT it carries identifies an end-user, not a tenant (DEC-FBR-04). The method takes a raw `project_id: Uuid` from the URL path and mints a `ProjectScope` bound to the project's owning tenant so the submission writes land in the correct tenant row via the type-system-protected scope (the schema's `tenant_id NOT NULL` invariant is upheld via the scope, not via caller-supplied data). The endpoint is intentionally public; authentication of the end-user happens via the JWT verifier (Contract C2) when an `Authorization: Bearer` header is present, and via the anonymous rate-limit gate (FR-FBR-06) otherwise. See DEC-PODS-001."

