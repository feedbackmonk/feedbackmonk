# feedbackmonk admin-ui nginx config — GitCellar Railway deployment (triage.gitcellar.com).
#
# Variant of admin-ui-nginx.conf for GitCellar's self-host on Railway (DEC-LR-02).
# Topology B, public-hairpin upstream:
#   - Serves the built admin-ui SPA at `/` (same-origin → admin-ui's relative
#     `baseURL: "/api/v1"` works with no CORS).
#   - Reverse-proxies `/api/*` + `/health*` to the **public** feedbackmonk-api
#     edge `https://feedback.gitcellar.com` over TLS (SNI), rather than the
#     docker-compose private name `api:14304`.
#
# Why public hairpin instead of Railway private networking (feedbackmonk-api.railway.internal):
#   Railway private networking is IPv6-only and requires the upstream to bind `::`.
#   The live feedbackmonk-api binds `0.0.0.0` (FEEDBACKMONK_BIND_ADDR), which serves
#   the public edge but is NOT reachable on the private mesh. Per DEC-LR-02 the live
#   feedback.gitcellar.com path must not be disturbed, so we proxy to the public edge
#   instead of changing the API's bind address. Admin↔API traffic hairpins out to the
#   Railway edge and back — negligible for low triage volume. If private networking is
#   wanted later, set FEEDBACKMONK_BIND_ADDR=:: on the API and point this at
#   http://feedbackmonk-api.railway.internal:14304.
#
# Session cookie: feedbackmonk_session is host-only (no Domain attribute), so the
# browser scopes it to triage.gitcellar.com regardless of the upstream Host header.

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 1m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Runtime DNS resolution for the public upstream (Railway edge IPs can rotate;
    # a literal-hostname proxy_pass would resolve only once at config load).
    resolver 1.1.1.1 8.8.8.8 valid=30s ipv6=off;

    # ----- API reverse proxy (public hairpin to feedback.gitcellar.com) ------
    location /api/ {
        set $fbm_api "feedback.gitcellar.com";
        proxy_pass https://$fbm_api;
        proxy_ssl_server_name on;                      # SNI — required for the cert/host match
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_http_version 1.1;
        proxy_set_header Host feedback.gitcellar.com;  # match the API's public host + cert
        proxy_set_header Connection "";
        proxy_set_header Origin "";                     # server-side call — keep off the API CORS path
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location = /health {
        set $fbm_api_h "feedback.gitcellar.com";
        proxy_pass https://$fbm_api_h/health;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host feedback.gitcellar.com;
        access_log off;
    }

    location = /health/ready {
        set $fbm_api_r "feedback.gitcellar.com";
        proxy_pass https://$fbm_api_r/health/ready;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host feedback.gitcellar.com;
        access_log off;
    }

    # ----- Static admin-ui SPA ----------------------------------------------
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # The SPA shell must NEVER be heuristically cached, or browsers keep
    # serving an old index.html that points at a stale (content-hashed) JS
    # bundle — which is exactly how a fixed deploy looks "still broken" until
    # a full cache clear (the /auth/login regression hid behind this). The
    # hashed assets above stay immutable; only the shell revalidates. Matches
    # both a direct GET /index.html and the try_files SPA fallback (the
    # internal redirect re-runs location matching, so this exact-match wins).
    # Security headers are re-stated because nginx drops inherited add_header
    # directives once a location declares its own.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
