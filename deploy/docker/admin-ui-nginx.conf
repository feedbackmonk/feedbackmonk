# feedbackmonk admin-ui nginx config (B2 topology).
#
# Edge config: serves the built React admin-ui as static assets at `/`
# (SPA fallback to index.html for client-side routing) and reverse-
# proxies the API surface to the `api` service in the same docker
# network at `http://api:14304`.
#
# Same-origin: from the browser's perspective, the admin-ui and the
# API live at the same origin (whatever the operator exposes
# the nginx port as). This avoids the need for CORS on the api binary
# (which is currently not wired — see admin-ui/README.md line 72 +
# P1 Stage 2 handoff line 678).
#
# Forwarded headers: standard X-Forwarded-* so the api can construct
# correct verify-email URLs against FEEDBACKMONK_PUBLIC_URL (the api
# uses PUBLIC_URL directly, but forwards are conventional).

server {
    listen 80 default_server;
    server_name _;

    # Sane default body size for feedback POST bodies (FR-FBR-03 allows
    # up to a few KB; bumping to 1MB covers future attachment metadata).
    client_max_body_size 1m;

    # Security headers. CSP is intentionally permissive at the nginx
    # layer; the widget bundle has its own CSP-safe build pipeline
    # (FR-FBR-04 + DEC-FBR-02). Operators behind a TLS proxy should
    # add HSTS at that proxy.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----- API reverse proxy -------------------------------------------------
    # The api binary listens on its FEEDBACKMONK_PORT (default 14304) inside
    # the docker network. Hard-coded to the C21 default here; if operators
    # override FEEDBACKMONK_PORT, they should also rebuild this image (the
    # value is baked at image-build time, not container-runtime).
    #
    # Future: parameterize via `envsubst` template if operator overrides
    # become common. For v1 self-host, the C21 default (14304) is the path
    # of least friction.

    location /api/ {
        proxy_pass http://api:14304;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://api:14304/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location = /health/ready {
        proxy_pass http://api:14304/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ----- Static admin-ui ---------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        # SPA fallback — any non-asset request falls back to index.html so
        # client-side React Router can handle the path.
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (vite emits hashed filenames).
        location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
